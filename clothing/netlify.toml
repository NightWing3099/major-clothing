[build]
  command = "npm run build"
  publish = "build"

# SPA redirect: all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-term cache for hashed JS/CSS assets (immutable content)
[[headers]]
  for = "/static/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for the service worker and asset-manifest
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/asset-manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Short cache for index.html (never cache the shell)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Media and image assets cached for 1 year
[[headers]]
  for = "/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers applied to all responses
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"